services:
  chat:
    build: .
    restart: unless-stopped
    ports:
      - "${PORT:-10000}:10000"
    env_file:
      - .env
    volumes:
      # メッセージログと返信ファイルをホスト側に永続化
      - chat_data:/data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  chat_data:
    driver: local
